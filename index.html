<!DOCTYPE html>
<html lang="en">
<head>
 <title>Jax BnB</title>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <link rel="shortcut icon" href="images/favicon.png">
 <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
 <link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-red.css">
 <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
 <link rel="stylesheet" href="css/all.min.css">
 <style>
  body,h1,h2,h3,h4,h5,h6 {font-family: "Raleway", Arial, Helvetica, sans-serif}
  .mySlides {display: none}
  .jaxlogotext
  {
   color: #F55139;
   font-size: 20pt;
   font-weight: bold;
  }
  .sup
  {
   vertical-align: super;
  }
 </style>
</head>
<body class="w3-content w3-border-left w3-border-right">
<!-- Sidebar/menu -->
<nav class="w3-sidebar w3-light-grey w3-collapse w3-top" style="z-index:3;width:260px" id="mySidebar">
 <div class="w3-container w3-display-container w3-padding-16">
  <i onclick="w3_close()" class="fa fa-remove w3-hide-large w3-button w3-transparent w3-display-topright"></i>
  <h3><img src="images/jaxbnblogo.webp"></h3>
  <div><span class="jaxlogotext">//</span> <span class="jaxlogotext w3-text-italic">JAX BnB</span></div>
  <h3>RESERVED</h3>
  <hr>
  <p><button class="w3-button w3-block w3-theme w3-left-align" type="submit" disabled><i class="fa fa-search w3-margin-right"></i> Search availability</button></p>
 </div>
 <div class="w3-bar-block">

 </div>
</nav>

<!-- Top menu on small screens -->
<header class="w3-bar w3-top w3-hide-large w3-black w3-xlarge">
 <span class="w3-bar-item">JAX BnB Short Term Rental</span>
 <a href="javascript:void(0)" class="w3-right w3-bar-item w3-button" onclick="w3_open()"><i class="fa fa-bars"></i></a>
</header>

<!-- Overlay effect when opening sidebar on small screens -->
<div class="w3-overlay w3-hide-large" onclick="w3_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>


 <!-- End page content -->
</div>

<script>
 // Script to open and close sidebar when on tablets and phones
 function w3_open() {
  document.getElementById("mySidebar").style.display = "block";
  document.getElementById("myOverlay").style.display = "block";
 }

 function w3_close() {
  document.getElementById("mySidebar").style.display = "none";
  document.getElementById("myOverlay").style.display = "none";
 }

 // Slideshow Apartment Images
 var slideIndex = 1;
 showDivs(slideIndex);

 function plusDivs(n) {
  showDivs(slideIndex += n);
 }

 function currentDiv(n) {
  showDivs(slideIndex = n);
 }

 function showDivs(n) {
  var i;
  var x = document.getElementsByClassName("mySlides");
  var dots = document.getElementsByClassName("demo");
  if (n > x.length) {slideIndex = 1}
  if (n < 1) {slideIndex = x.length}
  for (i = 0; i < x.length; i++) {
   x[i].style.display = "none";
  }
  for (i = 0; i < dots.length; i++) {
   dots[i].className = dots[i].className.replace(" w3-opacity-off", "");
  }
  x[slideIndex-1].style.display = "block";
  dots[slideIndex-1].className += " w3-opacity-off";
 }
</script>

</body>
</html>
